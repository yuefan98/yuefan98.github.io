name: Site Review

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-review:
    name: Static site review
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: node --check script.js

      - name: Review scientific wording and API guardrails
        run: python3 scripts/review_site.py
